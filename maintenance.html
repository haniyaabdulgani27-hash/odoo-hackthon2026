<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:30px;
}
.container{
max-width:1100px;
margin:auto;
}
.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,.1);
margin-bottom:25px;
}
h1{
color:#2563eb;
margin-bottom:20px;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}
label{
font-weight:bold;
}
input,select,textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}
button{
padding:10px 20px;
margin-top:20px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}
th{
background:#2563eb;
color:white;
}
</style>

</head>
<body>

<div class="container">

<h1>🔧 Maintenance Management</h1>

<div class="card">

<div class="grid">

<div>
<label>Vehicle</label>
<input type="text" placeholder="Vehicle Name">
</div>

<div>
<label>Maintenance Date</label>
<input type="date">
</div>

<div>
<label>Service Type</label>
<select>
<option>Engine Service</option>
<option>Oil Change</option>
<option>Tyre Change</option>
<option>General Checkup</option>
</select>
</div>

<div>
<label>Cost (₹)</label>
<input type="number">
</div>

<div>
<label>Status</label>
<select>
<option>Pending</option>
<option>Completed</option>
</select>
</div>

<div>
<label>Technician</label>
<input type="text">
</div>

</div>

<br>

<label>Remarks</label>
<textarea rows="4"></textarea>

<button>Save Maintenance</button>

</div>

<div class="card">

<h2>Maintenance List</h2>

<table>

<tr>
<th>ID</th>
<th>Vehicle</th>
<th>Date</th>
<th>Service</th>
<th>Cost</th>
<th>Status</th>
</tr>

<tr>
<td>1</td>
<td>Bus A</td>
<td>10-07-2026</td>
<td>Oil Change</td>
<td>₹3000</td>
<td>Completed</td>
</tr>

</table>

</div>

</div>

</body>
</html>
